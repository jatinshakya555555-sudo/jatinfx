<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reels - JatinFx</title>

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#1B1212;
  color:white;
  text-align:center;
  padding:80px 15px;
}

h1{
  font-size:36px;
  margin-bottom:60px;
  letter-spacing:3px;
}

/* CENTER WRAPPER */
.reels-container{
  display:flex;
  justify-content:center;
}

/* SHORTS RATIO */
.video-wrapper{
  position:relative;
  width:100%;
  max-width:360px;   /* 👈 important */
  aspect-ratio:9/16; /* 👈 modern clean method */
}

.video-wrapper iframe{
  width:100%;
  height:100%;
  border-radius:20px;
  border:none;
}
</style>
</head>

<body>

<h1>My Reels</h1>

<div class="reels-container">

  <div class="video-wrapper">
    <iframe 
      src="https://www.youtube.com/embed/8mFG_zat_SU"
      allowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
