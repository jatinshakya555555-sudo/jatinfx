<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming - JATINfx</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background:url("45.jpg") center/cover fixed;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:#000;
  z-index:1000;
}

.logo{
  position:fixed;
  top:18px;
  left:25px;
  font-family:Poppins;
  font-size:26px;
  z-index:1001;
}
.logo a{color:white;text-decoration:none;}
.logo span{color:#E56717;}

.menu-icon{
  position:fixed;
  top:18px;
  right:25px;
  font-size:30px;
  color:#E56717;
  cursor:pointer;
  z-index:1001;
}

.menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#000;
  transition:.4s;
  padding-top:120px;
  text-align:center;
}
.menu.active{right:0;}
.menu a{
  display:block;
  margin:25px 0;
  font-family:Poppins;
  text-decoration:none;
}
.menu a:nth-child(1){color:#F5DEB3;}
.menu a:nth-child(2){color:#E56717;}
.menu a:nth-child(3){color:#EFB261;}
.menu a:nth-child(4){color:#FF8040;}

/* CONTENT */
.container{
  padding:140px 20px 60px;
  max-width:1000px;
  margin:auto;
  text-align:center;
}

.main-title{
  font-family:Poppins;
  font-size:36px;
  letter-spacing:6px;
  margin-bottom:50px;
}

/* TOGGLE */
.toggle-buttons{
  margin-bottom:60px;
}
.toggle-buttons button{
  padding:12px 30px;
  margin:0 10px;
  border:none;
  border-radius:30px;
  background:#222;
  color:white;
  font-family:Poppins;
  letter-spacing:3px;
  cursor:pointer;
}
.toggle-buttons button.active{
  background:#E56717;
}

/* SECTION */
.section{display:none;}
.section.active{display:block;}

/* VIDEO CENTER FIX */
.video-section{
  margin-bottom:90px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.video-title{
  font-family:Poppins;
  letter-spacing:3px;
  margin-bottom:25px;
}

.video-wrapper{
  width:100%;
  max-width:750px;
  aspect-ratio:16/9;
  display:flex;
  justify-content:center;
  align-items:center;
}

.video-wrapper iframe{
  width:100%;
  height:100%;
  border-radius:18px;
  border:none;
}

/* SLIDER */
.wipe-slider{
  position:relative;
  max-width:750px;
  margin:auto;
  border-radius:20px;
  overflow:hidden;
}
.wipe-slider img{
  width:100%;
  display:block;
}
.top-img{
  position:absolute;
  top:0;
  left:0;
  clip-path:inset(0 50% 0 0);
}
.wipe-line{
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:white;
}
.wipe-circle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:40px;
  height:40px;
  background:#E56717;
  border-radius:50%;
}

/* BACK */
.back{
  margin-top:80px;
}
.back a{
  color:white;
  text-decoration:none;
  border-bottom:1px solid white;
}
</style>
</head>

<body>

<div class="topbar"></div>

<div class="logo">
<a href="index.html">Jatin<span>Fx</span></a>
</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="index.html">HOME</a>
<a href="gaming.html">GAMING</a>
<a href="about.html">ABOUT</a>
<a href="contact.html">CONTACT</a>
</div>

<div class="container">

<h1 class="main-title">GAMING</h1>

<div class="toggle-buttons">
<button id="videosBtn" class="active" onclick="showSection('videos')">VIDEOS</button>
<button id="thumbBtn" onclick="showSection('thumb')">THUMBNAILS</button>
</div>

<!-- VIDEOS -->
<div id="videos" class="section active">

<div class="video-section">
<div class="video-title">NOT BIGSHOT EDIT</div>
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/H-6bPxQqzNw" allowfullscreen></iframe>
</div>
</div>

<div class="video-section">
<div class="video-title">GAMING MONTAGE</div>
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/vma9CWf7g54" allowfullscreen></iframe>
</div>
</div>

</div>

<!-- THUMBNAILS -->
<div id="thumb" class="section">

<div class="wipe-slider" id="wipeSlider">
<img src="after.png">
<img src="before.png" class="top-img" id="topImage">
<div class="wipe-line" id="wipeLine">
<div class="wipe-circle"></div>
</div>
</div>

</div>

<div class="back">
<a href="index.html">← BACK TO HOME</a>
</div>

</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function showSection(section){
document.getElementById("videos").classList.remove("active");
document.getElementById("thumb").classList.remove("active");
document.getElementById("videosBtn").classList.remove("active");
document.getElementById("thumbBtn").classList.remove("active");

if(section==="videos"){
document.getElementById("videos").classList.add("active");
document.getElementById("videosBtn").classList.add("active");
}else{
document.getElementById("thumb").classList.add("active");
document.getElementById("thumbBtn").classList.add("active");
}
}

/* SLIDER */
const slider=document.getElementById("wipeSlider");
const topImage=document.getElementById("topImage");
const line=document.getElementById("wipeLine");
let isDragging=false;

function updateSlider(x){
const rect=slider.getBoundingClientRect();
let pos=x-rect.left;
let percent=(pos/rect.width)*100;
percent=Math.max(0,Math.min(100,percent));
topImage.style.clipPath=`inset(0 ${100-percent}% 0 0)`;
line.style.left=percent+"%";
}

slider.addEventListener("mousedown",()=>isDragging=true);
window.addEventListener("mouseup",()=>isDragging=false);
window.addEventListener("mousemove",e=>{if(isDragging)updateSlider(e.clientX);});

slider.addEventListener("touchstart",()=>isDragging=true);
window.addEventListener("touchend",()=>isDragging=false);
window.addEventListener("touchmove",e=>{if(isDragging)updateSlider(e.touches[0].clientX);});
</script>

</body>
</html>
