<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming - JATINfx</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background-image:url("45.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-10;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:#000;
  z-index:9000;
}

/* LOGO */
.logo{
  position:fixed;
  top:18px;
  left:25px;
  font-family:Poppins;
  font-size:26px;
  letter-spacing:2px;
  z-index:10001;
}
.logo a{ text-decoration:none; color:white; }
.logo span{ color:#E56717; }

/* MENU */
.menu-icon{
  position:fixed;
  top:18px;
  right:25px;
  font-size:30px;
  cursor:pointer;
  z-index:10000;
  color:#E56717;
}
.menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.95);
  transition:.4s;
  padding-top:120px;
  text-align:center;
  z-index:9999;
}
.menu.active{ right:0; }

.menu a{
  display:block;
  font-family:Poppins;
  letter-spacing:3px;
  font-size:20px;
  margin:25px 0;
  text-decoration:none;
}
.menu a:nth-child(1){ color:#F5DEB3; }
.menu a:nth-child(2){ color:#E56717; }
.menu a:nth-child(3){ color:#EFB261; }
.menu a:nth-child(4){ color:#FF8040; }

/* CONTENT */
.container{
  max-width:900px;
  margin:0 auto;
  padding:140px 15px 80px;
  text-align:center;
}

.section-title{
  font-family:Poppins;
  font-size:26px;
  letter-spacing:4px;
  margin-bottom:30px;
}

/* THUMBNAIL SLIDER */
.wipe-slider{
  position:relative;
  width:100%;
  margin:0 auto 90px auto;
  border-radius:20px;
  overflow:hidden;
}
.wipe-slider img{
  width:100%;
  display:block;
}
.top-img{
  position:absolute;
  top:0;
  left:0;
  clip-path:inset(0 50% 0 0);
}
.wipe-line{
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:#fff;
}
.wipe-circle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:40px;
  height:40px;
  background:#E56717;
  border-radius:50%;
}

/* VIDEOS */
.video-section{
  margin-bottom:90px;
}

.video-title{
  font-family:Poppins;
  font-size:18px;
  letter-spacing:3px;
  margin-bottom:15px;
}

.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  max-width:800px;
  margin:0 auto;
}

.video-wrapper iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border-radius:12px;
  border:none;
}
</style>
</head>

<body>

<div class="topbar"></div>

<div class="logo">
  <a href="./">Jatin<span>Fx</span></a>
</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <a href="./">HOME</a>
  <a href="./gaming.html">GAMING</a>
  <a href="./about.html">ABOUT</a>
  <a href="./contact.html">CONTACT</a>
</div>

<div class="container">

<!-- 🔥 THUMBNAIL SECTION -->
<h2 class="section-title" style="color:#E56717;">THUMBNAIL</h2>

<div class="wipe-slider" id="wipeSlider">
  <img src="after.png">
  <img src="before.png" class="top-img" id="topImage">
  <div class="wipe-line" id="wipeLine">
    <div class="wipe-circle"></div>
  </div>
</div>

<!-- 🔥 VIDEOS SECTION -->
<h2 class="section-title" style="color:#F5DEB3;">VIDEOS</h2>

<div class="video-section">
  <div class="video-title" style="color:#E56717;">
    NOT BIGSHOT EDIT
  </div>
  <div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/H-6bPxQqzNw" allowfullscreen></iframe>
  </div>
</div>

<div class="video-section">
  <div class="video-title" style="color:#F5DEB3;">
    GAMING MONTAGE
  </div>
  <div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/vma9CWf7g54" allowfullscreen></iframe>
  </div>
</div>

</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

const slider = document.getElementById("wipeSlider");
const topImage = document.getElementById("topImage");
const line = document.getElementById("wipeLine");

let isDragging = false;

function updateSlider(x){
  const rect = slider.getBoundingClientRect();
  let pos = x - rect.left;
  let percent = (pos / rect.width) * 100;
  percent = Math.max(0, Math.min(100, percent));
  topImage.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
  line.style.left = percent + "%";
}

slider.addEventListener("mousedown", () => isDragging = true);
window.addEventListener("mouseup", () => isDragging = false);
window.addEventListener("mousemove", e => { if(isDragging) updateSlider(e.clientX); });

slider.addEventListener("touchstart", () => isDragging = true);
window.addEventListener("touchend", () => isDragging = false);
window.addEventListener("touchmove", e => { if(isDragging) updateSlider(e.touches[0].clientX); });
</script>

</body>
</html>
